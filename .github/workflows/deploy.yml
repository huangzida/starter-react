name: Deploy

# GitHub Pages live demo (the ADR's replacement for a GIF). Builds the
# playground and publishes it under the repo's Pages URL.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build lib
        run: pnpm build:lib
      - name: Build playground
        env:
          PAGES_BASE: /${{ github.event.repository.name }}/
        run: pnpm build:playground
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/playground/dist

  deploy:
    name: Deploy demo
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
