pre-commit:
  commands:
    oxlint:
      glob: "*.{js,mjs,cjs,ts,tsx,jsx}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    oxfmt:
      glob: "*.{js,mjs,cjs,ts,tsx,jsx,json,css,md,mdx}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
